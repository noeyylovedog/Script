<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>JavaScript Workshop II</title>
    
    <script type="text/javascript">
        // 1. สร้างตัวแปรกลางเพื่อจดจำว่าตอนนี้ "เลือกรูปอะไรอยู่"
        var currentImageSrc = ""; 

        // 2. ฟังก์ชันเมื่อคลิกรูปที่เมนูด้านซ้าย
        function selectPhoto(photoName, imgSrc) {
            currentImageSrc = imgSrc; // จดจำที่อยู่รูปที่เลือก
            // เปลี่ยนข้อความตรงให้เป็นชื่อรูป
            document.getElementById("photoName").innerHTML = photoName;
        }

        // 3. ฟังก์ชันเมื่อคลิกที่ตาราง 4x4
        function changeCell(cellImage) {
            // เช็คว่าได้เลือกรูปจากเมนูซ้ายหรือยัง (ถ้าเลือกแล้ว currentImageSrc จะไม่เป็นค่าว่าง)
            if (currentImageSrc != "") {
                // เปลี่ยนรูปของช่องที่คลิก ให้เป็นรูปที่จำไว้
                cellImage.src = currentImageSrc;
            }
        }
    </script>

    <style>
        .container {
            display: flex;
            margin: 20px;
        }
        .left-menu {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: center;
            margin-right: 20px;
        }
        .left-menu img {
            width: 80px;
            height: 80px;
            cursor: pointer;
            margin-bottom: 10px;
            display: block;
        }
        .grid-area {
            border: 1px solid #ccc;
            padding: 20px;
            text-align: center;
            width: 400px;
        }
        .grid-table {
            border-collapse: collapse;
            margin: 0 auto;
        }
        .grid-table td {
            padding: 2px;
        }
        .grid-table img {
            cursor: pointer;
            width: 80px;
            height: 80px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="left-menu">
        <img src="img/ChristmasTree.png" onclick="selectPhoto('ChristmasTree', 'img/ChristmasTree.png')">
        <img src="img/Apple.png" onclick="selectPhoto('Apple', 'img/Apple.png')">
        <img src="img/Noodle.png" onclick="selectPhoto('Noodle', 'img/Noodle.png')">
        <img src="img/HamBurgur.png" onclick="selectPhoto('HamBurgur', 'img/HamBurgur.png')">
        <img src="img/bg.png" onclick="selectPhoto('bg', 'img/bg.png')">
    </div>

    <div class="grid-area">
        <h3>Photo</h3>
        <h4 id="photoName" style="color: gray;">(ยังไม่ได้เลือกรูป)</h4>
        
        <table class="grid-table" width="320" border="0" align="center">
            <tr>
                <td id="11"><img src="img/bg.png" onclick="changeCell(this)" /></td>
                <td id="12"><img src="img/bg.png" onclick="changeCell(this)" /></td>
                <td id="13"><img src="img/bg.png" onclick="changeCell(this)" /></td>
                <td id="14"><img src="img/bg.png" onclick="changeCell(this)" /></td>
            </tr>
            <tr>
                <td id="21"><img src="img/bg.png" onclick="changeCell(this)" /></td>
                <td id="22"><img src="img/bg.png" onclick="changeCell(this)" /></td>
                <td id="23"><img src="img/bg.png" onclick="changeCell(this)" /></td>
                <td id="24"><img src="img/bg.png" onclick="changeCell(this)" /></td>
            </tr>
            <tr>
                <td id="31"><img src="img/bg.png" onclick="changeCell(this)" /></td>
                <td id="32"><img src="img/bg.png" onclick="changeCell(this)" /></td>
                <td id="33"><img src="img/bg.png" onclick="changeCell(this)" /></td>
                <td id="34"><img src="img/bg.png" onclick="changeCell(this)" /></td>
            </tr>
            <tr>
                <td id="41"><img src="img/bg.png" onclick="changeCell(this)" /></td>
                <td id="42"><img src="img/bg.png" onclick="changeCell(this)" /></td>
                <td id="43"><img src="img/bg.png" onclick="changeCell(this)" /></td>
                <td id="44"><img src="img/bg.png" onclick="changeCell(this)" /></td>
            </tr>
        </table>
    </div>
</div>

</body>
</html>
